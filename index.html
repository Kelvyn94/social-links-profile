<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main class="card">
      <!-- Profile section -->
      <img
        class="profile-image"
        src="./assets/images/avatar-jessica.jpeg"
        alt="Jessica Randall - Front-end developer profile picture"
      />
      <h1 class="name">Jessica Randall</h1>
      <p class="location">London, United Kingdom</p>
      <p class="bio">"Font-end developer and avid reader."</p>

      <!-- Social links section -->

      <ul class="social-links">
        <li><a href="#" class="social-link">GitHub</a></li>
        <li><a href="#" class="social-link">Fontend Mentor</a></li>
        <li><a href="#" class="social-link">LinkedIn</a></li>
        <li><a href="#" class="social-link">Twitter</a></li>
        <li><a href="#" class="social-link">Instagram</a></li>
      </ul>
    </main>

    <!-- Attribution footer (required by Frontend Mentor) -->
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
